services:
  - type: web
    name: noble-travel-agency-portal
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: noble-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
